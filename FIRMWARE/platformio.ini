[env:pico]
platform = raspberrypi
board = pico
framework = arduino
lib_deps = 
	adafruit/Adafruit GFX Library@^1.12.5
	zinggjm/GxEPD2@^1.6.8
	arduino-libraries/SD@^1.3.0
	adafruit/SdFat - Adafruit Fork@^2.3.103
	adafruit/Adafruit TinyUSB Library@^3.7.4
